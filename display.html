<!DOCTYPE html>
<html>
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        :root { --blue: #007AFF; --bg: #F2F2F7; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .card { background: white; border-radius: 20px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.05); margin-bottom: 20px; }
        .btn { background: white; border: 2px solid var(--blue); color: var(--blue); padding: 15px; border-radius: 12px; width: 100%; font-size: 18px; font-weight: 600; margin-bottom: 10px; cursor: pointer; transition: 0.2s; }
        .btn:active { background: var(--blue); color: white; transform: scale(0.95); }
        .title { font-weight: 800; font-size: 24px; color: var(--blue); margin-bottom: 20px; }
    </style>
</head>
<body>
    <div class="title">GITTERTIER PRO REMOTE</div>
    <div class="card">
        <h3>Wagen-Steuerung</h3>
        <button class="btn" onclick="send('TURBO')">🚀 TURBO MODUS</button>
        <button class="btn" onclick="send('DISCO')">✨ DISCO LICHT</button>
        <button class="btn" onclick="send('BLINK_L')">⬅️ BLINKER LINKS</button>
        <button class="btn" onclick="send('BLINK_R')">➡️ BLINKER RECHTS</button>
    </div>
    <div class="card">
        <h3>System Info</h3>
        <p id="status">Verbunden mit Wagen</p>
    </div>

    <script>
        function send(cmd) {
            fetch('/cmd?v=' + cmd).then(r => console.log("Sent: " + cmd));
        }
    </script>
</body>
</html>
